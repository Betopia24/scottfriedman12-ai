services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: userid_api
    restart: unless-stopped
    ports:
      - "8003:8003"
    volumes:
      - ./static:/app/static
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - userid_network

networks:
  userid_network:
    driver: bridge